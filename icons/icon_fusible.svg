<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  <!-- Línea de entrada -->
  <line x1="2" y1="16" x2="9" y2="16" stroke="#aa44ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Línea de salida -->
  <line x1="23" y1="16" x2="30" y2="16" stroke="#aa44ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cuerpo del fusible (cápsula) -->
  <rect x="9" y="12" width="14" height="8" rx="4" fill="none" stroke="#aa44ff" stroke-width="2"/>
  <!-- Elemento fusible interno (hilo) -->
  <line x1="11" y1="16" x2="21" y2="16" stroke="#aa44ff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2,1"/>
  <!-- Puntos extremos -->
  <circle cx="9" cy="16" r="1.5" fill="#aa44ff"/>
  <circle cx="23" cy="16" r="1.5" fill="#aa44ff"/>
</svg>
