<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  <!-- Electric line (zigzag) -->
  <polyline points="2,22 8,10 14,18 20,8 26,16 30,10" fill="none" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node dots on line -->
  <circle cx="2" cy="22" r="2.5" fill="#ffd700"/>
  <circle cx="30" cy="10" r="2.5" fill="#ffd700"/>
  <!-- Mid nodes smaller -->
  <circle cx="8" cy="10" r="1.8" fill="#ffa500"/>
  <circle cx="14" cy="18" r="1.8" fill="#ffa500"/>
  <circle cx="20" cy="8" r="1.8" fill="#ffa500"/>
  <circle cx="26" cy="16" r="1.8" fill="#ffa500"/>
</svg>
