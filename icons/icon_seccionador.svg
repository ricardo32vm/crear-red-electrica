<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  <!-- Línea de entrada -->
  <line x1="2" y1="16" x2="10" y2="16" stroke="#ffaa00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Línea de salida -->
  <line x1="22" y1="16" x2="30" y2="16" stroke="#ffaa00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cuerpo del seccionador (rectángulo) -->
  <rect x="10" y="11" width="12" height="10" rx="2" fill="none" stroke="#ffaa00" stroke-width="2"/>
  <!-- Línea interna (abierto - diagonal) -->
  <line x1="12" y1="19" x2="20" y2="13" stroke="#ffaa00" stroke-width="2" stroke-linecap="round"/>
  <!-- Puntos de conexión -->
  <circle cx="10" cy="16" r="2" fill="#ffaa00"/>
  <circle cx="22" cy="16" r="2" fill="#ffaa00"/>
</svg>
