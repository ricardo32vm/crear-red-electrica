<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  <!-- Línea de entrada arriba -->
  <line x1="16" y1="2" x2="16" y2="8" stroke="#ff4466" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Línea de salida abajo -->
  <line x1="16" y1="24" x2="16" y2="30" stroke="#ff4466" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Semicírculo superior (devanado AT) -->
  <path d="M10 16 A6 6 0 0 1 22 16" fill="none" stroke="#ff4466" stroke-width="2.2"/>
  <!-- Semicírculo inferior (devanado BT) -->
  <path d="M10 16 A6 6 0 0 0 22 16" fill="none" stroke="#ff4466" stroke-width="2.2"/>
  <!-- Punto central -->
  <circle cx="16" cy="16" r="2" fill="#ff4466"/>
  <!-- Rayos/energía -->
  <line x1="7" y1="10" x2="10" y2="13" stroke="#ff4466" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="10" x2="22" y2="13" stroke="#ff4466" stroke-width="1.5" stroke-linecap="round"/>
</svg>
